# SkywarnPlus-NG reverse proxy for Apache 2.4
# monitoring.http_server.base_path must be "/skywarnplus-ng" (no trailing slash).
# Backend: skywarnplus-ng.service on 127.0.0.1:8100
#
# Installed by the skywarnplus-ng .deb into /etc/apache2/conf-available/ and enabled via a2enconf.
# Applies to all VirtualHosts on the node (typical ASL/Supermon setups on :80/:443).

# WebSocket live dashboard updates — MUST be before HTTP ProxyPass (mod_proxy_wstunnel)
ProxyPass        /skywarnplus-ng/ws ws://127.0.0.1:8100/ws
ProxyPassReverse /skywarnplus-ng/ws ws://127.0.0.1:8100/ws

# Strip /skywarnplus-ng prefix when forwarding to aiohttp
ProxyPass        /skywarnplus-ng/ http://127.0.0.1:8100/
ProxyPassReverse /skywarnplus-ng/ http://127.0.0.1:8100/
ProxyPass        /skywarnplus-ng http://127.0.0.1:8100/
ProxyPassReverse /skywarnplus-ng http://127.0.0.1:8100/

# Dashboard WebSocket + poll cycles can be long-lived
ProxyTimeout 86400
