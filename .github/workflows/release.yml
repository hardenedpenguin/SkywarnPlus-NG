# Build release tarball and attach to GitHub Release when a version tag is pushed.
#
# Before tagging:
#   1. Bump version in pyproject.toml and src/skywarnplus_ng/__init__.py to match the tag.
#   2. Update debian/changelog (or run scripts/debian/sync-changelog-version.py).
#   3. Commit, then: git tag -a vX.Y.Z -m "Release vX.Y.Z" && git push && git push origin vX.Y.Z
# This workflow: verifies pyproject.toml version matches tag, updates README.md download URLs
# for this release, runs create_release.py (tarball includes updated README), builds amd64/arm64
# .deb packages, creates the GitHub Release with generate_release_notes, and uploads assets.
# amd64 debs + tarball publish as soon as amd64 build finishes; arm64 debs upload when available.

name: Release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-deb-amd64:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install deb build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y devscripts debhelper build-essential python3 python3-pip python3-venv curl ca-certificates

      - name: Build Debian packages (amd64)
        run: |
          chmod +x scripts/build_deb.sh scripts/debian/*.sh debian/rules
          ./scripts/build_deb.sh

      - name: Upload Debian packages
        uses: actions/upload-artifact@v4
        with:
          name: debs-amd64
          path: dist/debs/*.deb
          if-no-files-found: error

  build-deb-arm64:
    runs-on: ubuntu-24.04-arm64
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install deb build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y devscripts debhelper build-essential python3 python3-pip python3-venv curl ca-certificates

      - name: Build Debian packages (arm64)
        run: |
          chmod +x scripts/build_deb.sh scripts/debian/*.sh debian/rules
          ./scripts/build_deb.sh

      - name: Upload Debian packages
        uses: actions/upload-artifact@v4
        with:
          name: debs-arm64
          path: dist/debs/*.deb
          if-no-files-found: error

  release:
    needs: build-deb-amd64
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Verify tag matches version in pyproject.toml
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION=$(grep -E '^version\s*=' pyproject.toml | sed -E 's/.*=\s*["]?([^"]+)["]?/\1/' | tr -d ' ')
          if [ "v${VERSION}" != "${TAG}" ]; then
            echo "::error::Tag ${TAG} does not match version in pyproject.toml (${VERSION}). Bump version and commit before tagging."
            exit 1
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "TAG=${TAG}" >> $GITHUB_ENV

      - name: Update README.md download URLs to this release
        run: |
          sed -i "s|releases/download/v[0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*/skywarnplus-ng-[0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*\.tar\.gz|releases/download/${TAG}/skywarnplus-ng-${VERSION}.tar.gz|g" README.md
          sed -i "s|skywarnplus-ng-[0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*\.tar\.gz|skywarnplus-ng-${VERSION}.tar.gz|g" README.md
          sed -i "s|cd skywarnplus-ng-[0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*|cd skywarnplus-ng-${VERSION}|g" README.md

      - name: Create release tarball
        run: python3 scripts/create_release.py

      - name: Download amd64 Debian packages
        uses: actions/download-artifact@v4
        with:
          name: debs-amd64
          path: dist/debs

      - name: Create Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          generate_release_notes: true
          files: |
            skywarnplus-ng-${{ env.VERSION }}.tar.gz
            dist/debs/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync README.md on main branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout -B main origin/main
          sed -i "s|releases/download/v[0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*/skywarnplus-ng-[0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*\.tar\.gz|releases/download/${TAG}/skywarnplus-ng-${VERSION}.tar.gz|g" README.md
          sed -i "s|skywarnplus-ng-[0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*\.tar\.gz|skywarnplus-ng-${VERSION}.tar.gz|g" README.md
          sed -i "s|cd skywarnplus-ng-[0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*|cd skywarnplus-ng-${VERSION}|g" README.md
          if git diff --quiet README.md; then
            echo "README.md already matches ${TAG}; nothing to push."
          else
            git add README.md
            git commit -m "docs: sync README download URLs for ${TAG}"
            git push origin main
          fi

  publish-arm64-debs:
    needs: [release, build-deb-arm64]
    if: needs.build-deb-arm64.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download arm64 Debian packages
        uses: actions/download-artifact@v4
        with:
          name: debs-arm64
          path: dist/debs

      - name: Upload arm64 debs to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/debs/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
