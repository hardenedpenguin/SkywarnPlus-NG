# Build amd64/arm64 .deb packages on release tags (see release.yml).
# Optional manual run to validate packaging on amd64.
name: Debian package

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'debian/**'
      - 'scripts/debian/**'
      - 'scripts/build_deb.sh'
      - 'pyproject.toml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-deb-amd64:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y devscripts debhelper build-essential python3 python3-pip python3-venv curl ca-certificates

      - name: Build Debian packages
        run: |
          chmod +x scripts/build_deb.sh scripts/debian/*.sh debian/rules
          PYTHON=/usr/bin/python3 ./scripts/build_deb.sh

      - name: Verify packages
        run: |
          ls -lh dist/debs/
          test "$(ls -1 dist/debs/*.deb | wc -l)" -eq 3
          dpkg-deb -I dist/debs/skywarnplus-ng_*_amd64.deb | grep -E 'Depends|Package' | head -5
          dpkg-deb -x dist/debs/skywarnplus-ng_*_amd64.deb /tmp/swp-deb-check
          ! grep -q hostedtoolcache /tmp/swp-deb-check/var/lib/skywarnplus-ng/venv/pyvenv.cfg
