# Build amd64/arm64 .deb packages on release tags (see release.yml).
# Optional manual run to validate packaging on amd64.
name: Debian package

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'debian/**'
      - 'scripts/debian/**'
      - 'scripts/build_deb.sh'
      - 'pyproject.toml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-deb-amd64:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y devscripts debhelper build-essential curl ca-certificates

      - name: Build Debian packages
        run: |
          chmod +x scripts/build_deb.sh scripts/debian/*.sh debian/rules
          ./scripts/build_deb.sh

      - name: Verify packages
        run: |
          ls -lh dist/debs/
          test "$(ls -1 dist/debs/*.deb | wc -l)" -eq 1
          dpkg-deb -I dist/debs/skywarnplus-ng_*_amd64.deb | grep -E 'Depends|Package' | head -5
          dpkg-deb -x dist/debs/skywarnplus-ng_*_amd64.deb /tmp/swp-deb-check
          file /tmp/swp-deb-check/var/lib/skywarnplus-ng/venv/bin/python3 | grep -q ELF
          grep -q '^version = 3.13' /tmp/swp-deb-check/var/lib/skywarnplus-ng/venv/pyvenv.cfg
          /tmp/swp-deb-check/var/lib/skywarnplus-ng/venv/bin/python -c 'import skywarnplus_ng.cli'
